<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoKey 3D</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .profile-card {
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s, box-shadow .15s;
    }
    .profile-card:hover { border-color: #0d6efd44; }
    .profile-card.selected { border-color: #0d6efd; box-shadow: 0 0 0 3px #0d6efd22; }
    .profile-card img { height: 80px; object-fit: contain; background: #fff; padding: 4px; }
    #status-box { min-height: 2.5rem; }
    #search { max-width: 320px; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="d-flex align-items-baseline justify-content-between mb-1">
    <h1 class="mb-0">AutoKey 3D</h1>
    <div class="d-flex gap-2">
      <a href="/add-profile" class="btn btn-outline-secondary btn-sm">+ Add profile</a>
      <a href="/add-system" class="btn btn-outline-secondary btn-sm">+ Add system</a>
    </div>
  </div>
  <p class="text-muted mb-4">Generate a 3D-printable key blank or bump key</p>

  <!-- Profile picker -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center gap-3">
      <strong>1. Select profile</strong>
      <input id="search" type="search" class="form-control form-control-sm" placeholder="Search profiles…">
    </div>
    <div class="card-body">
      <div id="profile-grid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 g-2">
        <div class="col text-muted">Loading…</div>
      </div>
    </div>
  </div>

  <!-- System + options -->
  <div class="card mb-3">
    <div class="card-header"><strong>2. Configure</strong></div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Lock system</label>
          <select id="system-select" class="form-select">
            <option value="">— select system —</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Mode</label>
          <select id="mode-select" class="form-select">
            <option value="blank">Blank</option>
            <option value="bumpkey">Bump key</option>
            <option value="key">Key (combination)</option>
          </select>
        </div>
        <div class="col-md-4" id="combo-group">
          <label class="form-label">Combination <span class="text-muted small">(e.g. 1,2,3,4,5)</span></label>
          <input id="combo-input" type="text" class="form-control" placeholder="1,2,3,4,5" disabled>
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-3">
          <label class="form-label">Tolerance override <span class="text-muted small">(optional)</span></label>
          <input id="tol-input" type="number" step="0.05" class="form-control" placeholder="default">
        </div>
        <div class="col-md-3 d-flex align-items-end gap-3 pb-1">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="thin-handle">
            <label class="form-check-label" for="thin-handle">Thin handle</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="match-handle">
            <label class="form-check-label" for="match-handle">Match connector</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Generate -->
  <div class="d-flex align-items-center gap-3 mb-2">
    <button id="gen-btn" class="btn btn-primary px-4" disabled>Generate STL</button>
    <div id="status-box"></div>
  </div>
</div>

<script>
let allProfiles = [];
let allSystems = [];
let selectedProfile = null;
let currentJobId = null;
let pollTimer = null;

async function loadData() {
  const res = await fetch('/api/profiles');
  const data = await res.json();
  allProfiles = data.profiles;
  allSystems = data.systems;
  renderSystems();
  renderProfiles(allProfiles);
}

function renderSystems() {
  const sel = document.getElementById('system-select');
  sel.innerHTML = '<option value="">— select system —</option>';
  allSystems.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
}

function renderProfiles(list) {
  const grid = document.getElementById('profile-grid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<div class="col text-muted">No profiles found.</div>';
    return;
  }
  list.forEach(p => {
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = `
      <div class="card profile-card h-100 text-center p-2${p.name === selectedProfile ? ' selected' : ''}"
           data-name="${p.name}">
        <img src="/thumbnails/${encodeURIComponent(p.name)}" alt="${p.name}"
             class="mx-auto d-block mb-1" onerror="this.style.display='none'">
        <div class="small fw-semibold text-truncate">${p.name}</div>
      </div>`;
    col.querySelector('.profile-card').addEventListener('click', () => selectProfile(p.name));
    grid.appendChild(col);
  });
}

function selectProfile(name) {
  selectedProfile = name;
  document.querySelectorAll('.profile-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.name === name);
  });
  // Auto-select default system if present
  const profile = allProfiles.find(p => p.name === name);
  if (profile && profile.default_system) {
    document.getElementById('system-select').value = profile.default_system;
  }
  // Pre-tick handle options from profile metadata
  document.getElementById('thin-handle').checked = profile?.thin_handle ?? false;
  document.getElementById('match-handle').checked = profile?.match_handle ?? false;
  updateGenBtn();
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderProfiles(q ? allProfiles.filter(p => p.name.toLowerCase().includes(q)) : allProfiles);
});

document.getElementById('mode-select').addEventListener('change', e => {
  const isKey = e.target.value === 'key';
  document.getElementById('combo-input').disabled = !isKey;
  updateGenBtn();
});

document.getElementById('system-select').addEventListener('change', updateGenBtn);
document.getElementById('combo-input').addEventListener('input', updateGenBtn);

function updateGenBtn() {
  const mode = document.getElementById('mode-select').value;
  const system = document.getElementById('system-select').value;
  const combo = document.getElementById('combo-input').value.trim();
  const ok = selectedProfile && system && (mode !== 'key' || combo);
  document.getElementById('gen-btn').disabled = !ok;
}

document.getElementById('gen-btn').addEventListener('click', async () => {
  clearPoll();
  setStatus('info', 'Submitting…');
  document.getElementById('gen-btn').disabled = true;

  const body = {
    profile: selectedProfile,
    system: document.getElementById('system-select').value,
    mode: document.getElementById('mode-select').value,
    combination: document.getElementById('combo-input').value.trim() || null,
    tol_override: document.getElementById('tol-input').value || null,
    thin_handle: document.getElementById('thin-handle').checked,
    match_handle: document.getElementById('match-handle').checked,
  };

  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) { setStatus('danger', data.error); updateGenBtn(); return; }

  currentJobId = data.job_id;
  setStatus('info', 'Generating… (OpenSCAD is rendering, this may take a moment)');
  pollTimer = setInterval(pollStatus, 2000);
});

async function pollStatus() {
  if (!currentJobId) return;
  const res = await fetch(`/api/status/${currentJobId}`);
  const data = await res.json();
  if (data.status === 'done') {
    clearPoll();
    setStatus('success',
      `Done! <a href="/api/download/${currentJobId}" class="btn btn-sm btn-success ms-2">Download STL</a>`);
    updateGenBtn();
  } else if (data.status === 'error') {
    clearPoll();
    setStatus('danger', 'Error: ' + data.error);
    updateGenBtn();
  }
}

function clearPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

function setStatus(type, html) {
  const box = document.getElementById('status-box');
  box.innerHTML = `<div class="alert alert-${type} py-2 mb-0">${html}</div>`;
}

loadData();
</script>
</body>
</html>
