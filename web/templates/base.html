<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AutoKey 3D{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f0f2f5; min-height: 100vh; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .navbar-brand span { color: #6ea8fe; }
    .page-header {
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 1.25rem 0;
      margin-bottom: 1.75rem;
    }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .page-header .text-muted { font-size: .875rem; }
    .card { border: 1px solid #e2e6ea; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .profile-card {
      cursor: pointer;
      border: 2px solid transparent !important;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      position: relative;
      overflow: hidden;
    }
    .profile-card:hover { border-color: #0d6efd44 !important; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13,110,253,.12) !important; }
    .profile-card.selected { border-color: #0d6efd !important; box-shadow: 0 0 0 3px #0d6efd22 !important; }
    .profile-card img { height: 80px; object-fit: contain; background: #fff; padding: 4px; }
    .profile-card .card-overlay {
      position: absolute; inset: 0;
      background: rgba(13,110,253,.08);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
    }
    .profile-card:hover .card-overlay { opacity: 1; }
    .table th { font-size: .8125rem; text-transform: uppercase; letter-spacing: .04em; color: #6c757d; font-weight: 600; }
    .table td.mono { font-family: 'SFMono-Regular', Consolas, monospace; font-size: .875rem; }
    dl.params dt { font-size: .8125rem; text-transform: uppercase; letter-spacing: .04em; color: #6c757d; font-weight: 600; }
    dl.params dd { font-size: 1rem; margin-bottom: .75rem; }
    .badge-bool-true  { background: #d1e7dd; color: #0a3622; }
    .badge-bool-false { background: #e9ecef; color: #495057; }
    .view-mode .edit-field { display: none; }
    .edit-mode .view-field { display: none; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">AutoKey <span>3D</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'generate' %}active{% endif %}" href="/">
            <i class="bi bi-gear-fill me-1"></i>Generate
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'profiles' %}active{% endif %}" href="/profiles">
            <i class="bi bi-key-fill me-1"></i>Profiles
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_page == 'systems' %}active{% endif %}" href="/systems">
            <i class="bi bi-diagram-3-fill me-1"></i>Systems
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
